<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no' name='viewport'>
  <meta content='#0b0f19' name='theme-color'>
  <title>Master Pusat | CIS Command</title>
  <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700;900&display=swap' rel='stylesheet'>
  <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css' rel='stylesheet'>
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
    * { box-sizing: border-box; outline: none; }
    .container { width: 100%; max-width: 1000px; padding: 20px;}
    
    #login-screen { position: fixed; inset:0; background: radial-gradient(circle at top, #2c3e50, #0b0f19); display: flex; align-items: center; justify-content: center; z-index: 99999; }
    .login-card { background: rgba(255,255,255,0.05); padding: 40px 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center; }
    .login-input { width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid #34495e; color: white; border-radius: 8px; margin-bottom: 15px; font-family: inherit; }
    .login-btn { background: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }

    .main-header { text-align: center; margin-bottom: 30px; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
    .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    @media (min-width: 600px) { .grid-menu { grid-template-columns: repeat(3, 1fr); } }
    
    .menu-box { background: white; border-radius: 15px; padding: 20px 10px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.05); cursor: pointer; border-bottom: 5px solid #bdc3c7; }
    .menu-box i { font-size: 2rem; margin-bottom: 10px; }
    .menu-box span { font-size: 0.7rem; font-weight: 800; text-transform: uppercase;}

    .admin-screen { position: fixed; inset: 0; background: #f0f2f5; z-index: 1000; display: none; flex-direction: column; overflow-x: hidden; }
    .screen-header { background: #2c3e50; color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; font-family: 'Orbitron', sans-serif; position: sticky; top: 0; z-index: 10; }
    .btn-back { font-size: 1.2rem; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; }
    .screen-content { padding: 20px; overflow-y: auto; flex: 1; max-width: 1000px; margin: 0 auto; width: 100%;}
    
    .card-panel { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0;}
    .form-group { margin-bottom: 15px; width: 100%; }
    label { font-size: 0.75rem; color: #7f8c8d; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 5px;}
    input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-weight: 600;}
    .btn-main { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
    
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #2c3e50;}
  </style>
</head>
<body>

  <div id='login-screen'>
      <div class='login-card'>
          <h2 style="color:#f1c40f; font-family:Orbitron; margin-bottom:20px;">CIS COMMAND</h2>
          <input class='login-input' id='logUser' placeholder='Username' type='text'>
          <input class='login-input' id='logPass' placeholder='Password' type='password'>
          <button class='login-btn' id='btnLogin'>SECURE LOGIN</button>
      </div>
  </div>

  <div class='container' id='mainDashboard' style='display:none;'>
    <div class='main-header'>
      <h1 style="font-family:Orbitron; color:#2c3e50;">PORTAL ADMIN</h1>
      <button onclick="window.logoutAdmin()" style="position:absolute; right:20px; top:20px; background:#e74c3c; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">LOGOUT</button>
    </div>

    <div class='grid-menu'>
      <div class='menu-box' onclick='window.openScreen("scr-pabrik")' style='border-color:#3498db;'><i class='fa-solid fa-industry' style='color:#3498db;'></i><span>Pabrik Token</span></div>
      <div class='menu-box' onclick='window.openScreen("scr-akuntansi")' style='border-color:#27ae60;'><i class='fa-solid fa-book-open-reader' style='color:#27ae60;'></i><span>Buku Kas Pusat</span></div>
      <div class='menu-box' onclick='window.openScreen("scr-approval")' style='border-color:#e67e22;'><i class='fa-solid fa-money-bill-transfer' style='color:#e67e22;'></i><span>Antrean WD</span></div>
    </div>
  </div>

  <!-- PABRIK TOKEN (Mendukung Username Huruf Besar Otomatis) -->
  <div class='admin-screen' id='scr-pabrik'>
    <div class='screen-header'><div class='btn-back' onclick='window.closeScreen()'><i class='fa-solid fa-arrow-left'></i></div> PABRIK TOKEN</div>
    <div class='screen-content'>
      <div class='card-panel'>
        <div class='form-group'>
          <label>Target Distribusi:</label>
          <select id='distTim' onchange='document.getElementById("inpTargetUserPabrik").style.display = this.value==="USER" ? "block" : "none";'>
            <option value='USER'>🚀 KIRIM LANGSUNG KE PEMAIN</option>
            <option value='Tim 1'>Tim 1</option>
          </select>
          <input class='input-dark' id='inpTargetUserPabrik' placeholder='Ketik Username Pemain' style='margin-top:10px;' type='text' oninput='this.value = this.value.toUpperCase().replace(/\s/g, "")'>
        </div>
        <div class='form-group'>
          <label>Jenis Token:</label>
          <select id='jenisTokenPabrik'><option value='REG'>Aktivasi (REG)</option><option value='MINING'>Speed (MINING)</option></select>
        </div>
        <div style='display:flex; gap:10px;'>
          <div class='form-group'><label>Nominal</label><select id='nomToken'><option value='100000'>100 Ribu</option><option value='500000'>500 Ribu</option></select></div>
          <div class='form-group'><label>Lembar</label><input id='jmlToken' type='number' value='1'></div>
        </div>
        <button class='btn-main' id='btnCetakToken'>Cetak & Distribusi</button>
        <div id='logToken' style='text-align:center; margin-top:15px; color:#27ae60; font-weight:bold;'></div>
      </div>
    </div>
  </div>

  <!-- BUKU KAS INDUK -->
  <div class='admin-screen' id='scr-akuntansi'>
    <div class='screen-header'><div class='btn-back' onclick='window.closeScreen()'><i class='fa-solid fa-arrow-left'></i></div> BUKU KAS INDUK</div>
    <div class='screen-content'>
        <div class='card-panel' style='background:#1e293b; color:white;'>
            <h3 style='margin-top:0; color:#2ecc71;'><i class='fa-solid fa-vault'></i> BRANKAS PUSAT</h3>
            <div style='display:flex; justify-content:space-between;'>
                <div><small style='color:#bdc3c7;'>TOKEN TERCETAK (IN)</small><br><b id='kasTotalIn' style='font-size:1.2rem; color:#2ecc71;'>Rp 0</b></div>
                <div style='text-align:right;'><small style='color:#bdc3c7;'>WD DICAIRKAN (OUT)</small><br><b id='kasTotalOut' style='font-size:1.2rem; color:#e74c3c;'>Rp 0</b></div>
            </div>
        </div>
        <div class='card-panel'>
            <h4>History Transaksi</h4>
            <div style='overflow-x:auto;'>
                <table>
                    <thead><tr><th>Tanggal</th><th>Jenis</th><th>Deskripsi</th><th>Nominal</th></tr></thead>
                    <tbody id='tblAkuntansiPusat'><tr><td colspan='4' style='text-align:center;'>Memuat buku kas...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
  </div>

  <div class='admin-screen' id='scr-approval'>
    <div class='screen-header'><div class='btn-back' onclick='window.closeScreen()'><i class='fa-solid fa-arrow-left'></i></div> Antrean WD</div>
    <div class='screen-content'>
      <div class='card-panel'>
        <button class='btn-main' id='btnAccBatch' style='background:#27ae60; margin-bottom:15px;'>Setujui Terpilih</button>
        <div style='overflow-x:auto;'>
            <table>
                <thead><tr><th><input type="checkbox" id="chkAllWD" onchange="document.querySelectorAll('.chk-wd').forEach(c => c.checked = this.checked)"></th><th>Pemohon</th><th>Nominal</th></tr></thead>
                <tbody id='tblApproval'><tr><td colspan='3' style='text-align:center;'>Memuat...</td></tr></tbody>
            </table>
        </div>
      </div>
    </div>
  </div>

  <script type='module'>
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, serverTimestamp, query, orderBy, where, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const app = initializeApp({ apiKey: "AIzaSyAbCd6ybj0jG5pykMyjQo5wetNhLRTDAbA", authDomain: "cis-server-utama.firebaseapp.com", projectId: "cis-server-utama", storageBucket: "cis-server-utama.firebasestorage.app", messagingSenderId: "70183885296", appId: "1:70183885296:web:01ff52b10937fe0684a535" });
    const db = getFirestore(app);

    window.openScreen = (id) => { document.getElementById('mainDashboard').style.display = 'none'; document.getElementById(id).style.display = 'flex'; if(id === 'scr-akuntansi') window.loadAkuntansiPusat(); if(id === 'scr-approval') window.loadApprovalWD(); };
    window.closeScreen = () => { document.querySelectorAll('.admin-screen').forEach(el => el.style.display = 'none'); document.getElementById('mainDashboard').style.display = 'block'; };

    // FUNGSI SESI ANTI-LOGOUT
    window.addEventListener('load', () => {
        let savedAdmin = localStorage.getItem("cisAdminLog");
        if(savedAdmin) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
        } else { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('mainDashboard').style.display = 'none'; }
    });

    document.getElementById('btnLogin').addEventListener('click', async () => {
        let u = document.getElementById('logUser').value.trim(); let p = document.getElementById('logPass').value.trim();
        if(u === "master" && p === "cis2026") { 
            localStorage.setItem("cisAdminLog", "true");
            document.getElementById('login-screen').style.display = 'none'; document.getElementById('mainDashboard').style.display = 'block';
        } else { alert("Password Salah!"); }
    });

    window.logoutAdmin = () => { localStorage.removeItem("cisAdminLog"); location.reload(); };

    // FUNGSI PABRIK TOKEN (Mendukung Username Huruf Besar)
    document.getElementById('btnCetakToken').addEventListener('click', async () => {
        const tim = document.getElementById('distTim').value; const nom = parseInt(document.getElementById('nomToken').value); const jml = parseInt(document.getElementById('jmlToken').value); 
        let jenisTkn = document.getElementById('jenisTokenPabrik').value; const log = document.getElementById('logToken'); 
        let targetUserEmail = ""; let targetUsernameFinal = ""; let finalPemilik = tim;

        if(tim === 'USER') { 
            let rawInput = document.getElementById('inpTargetUserPabrik').value.trim().toUpperCase().replace(/\s/g, "");
            if(!rawInput) return alert("Masukkan Username pemain!"); 
            log.innerText = "Mencari pemain..."; document.getElementById('btnCetakToken').disabled = true;

            const q2 = query(collection(db, "Akun_Publik"), where("username", "==", rawInput)); 
            let res2 = await getDocs(q2); 
            if(res2.empty) { alert("❌ Pemain tidak ditemukan!"); log.innerText = ""; document.getElementById('btnCetakToken').disabled = false; return; } 
            
            targetUserEmail = res2.docs[0].data().email; targetUsernameFinal = res2.docs[0].data().username; finalPemilik = targetUserEmail; 
        }
        
        log.innerText = "Mencetak..."; document.getElementById('btnCetakToken').disabled = true;
        
        for(let i = 0; i < jml; i++){
            let t = ''; const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; for(let j = 0; j < 16; j++) t += chars.charAt(Math.floor(Math.random() * chars.length)); let tk = `${t.slice(0,4)}-${t.slice(4,8)}-${t.slice(8,12)}-${t.slice(12,16)}`;
            
            await addDoc(collection(db, "Database_Token"), { kode_token: tk, nominal_rupiah: nom, status: "AKTIF", distribusi_ke: jenisTkn, pemilik: finalPemilik, pemilik_username: targetUsernameFinal, pengirim: "Pusat (Master)", pembuat: "Master Admin", dibuat_pada: serverTimestamp() });
        }

        // CATAT KE BUKU KAS INDUK SEBAGAI UANG MASUK (IN)
        await addDoc(collection(db, "Mutasi_Pusat"), { jenis: "IN", nominal: (nom * jml), deskripsi: `Cetak ${jml} Lembar Token ${jenisTkn} untuk ${tim === 'USER' ? targetUsernameFinal : tim}`, waktu: serverTimestamp() });
        
        log.innerText = `✅ Berhasil mencetak ${jml} Token!`; document.getElementById('btnCetakToken').disabled = false;
    });

    // FUNGSI BUKU KAS INDUK (AKUNTANSI)
    window.loadAkuntansiPusat = async () => {
        const tbody = document.getElementById('tblAkuntansiPusat');
        tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Mensinkronkan Buku Kas...</td></tr>";
        try {
            const snap = await getDocs(query(collection(db, "Mutasi_Pusat"), orderBy("waktu", "desc")));
            let html = ""; let totalIn = 0; let totalOut = 0;
            snap.forEach(d => { let x = d.data(); if(x.jenis === "IN") totalIn += x.nominal; if(x.jenis === "OUT") totalOut += x.nominal; });
            
            document.getElementById('kasTotalIn').innerText = "Rp " + totalIn.toLocaleString('id-ID'); document.getElementById('kasTotalOut').innerText = "Rp " + totalOut.toLocaleString('id-ID');

            let dataArr = []; snap.forEach(d => dataArr.push(d.data()));
            dataArr.slice(0, 50).forEach(x => {
                let wkt = x.waktu ? x.waktu.toDate().toLocaleDateString('id-ID') : new Date().toLocaleDateString('id-ID');
                let color = x.jenis === "IN" ? "#2ecc71" : "#e74c3c"; let sign = x.jenis === "IN" ? "+" : "-";
                html += `<tr><td>${wkt}</td><td style='color:${color};'><b>${x.jenis}</b></td><td>${x.deskripsi}</td><td style='color:${color};'>${sign} Rp ${(x.nominal||0).toLocaleString('id-ID')}</td></tr>`;
            });
            tbody.innerHTML = html || "<tr><td colspan='4' style='text-align:center;'>Belum ada transaksi tercatat.</td></tr>";
        } catch(e) { tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:red;'>Gagal memuat.</td></tr>"; }
    };

    // FUNGSI ANTREAN WD
    let unsubApproval = null;
    window.loadApprovalWD = () => { 
        const tbody = document.getElementById('tblApproval'); if(unsubApproval) unsubApproval(); 
        const q = query(collection(db, "Request_Withdraw"), where("status", "==", "PENDING"), orderBy("waktu_request", "asc")); 
        unsubApproval = onSnapshot(q, (snap) => { 
            let html = ""; if(snap.empty) { tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>TIDAK ADA ANTREAN</td></tr>"; return; } 
            snap.forEach(doc => { 
                let d = doc.data(); 
                html += `<tr><td><input type='checkbox' class='chk-wd' value='${doc.id}' data-userdoc='${d.doc_id_pemohon}' data-nominal='${d.nominal_rupiah}' data-jenis='${d.distribusi_ke}' data-email='${d.email_pemohon}' data-targetuser='${d.target_username}'></td><td><b>${d.username_pemohon}</b><br><small>${d.distribusi_ke}</small></td><td style='color:#e74c3c; font-weight:bold;'>Rp ${d.nominal_rupiah.toLocaleString()}</td></tr>`; 
            }); tbody.innerHTML = html; 
        }); 
    };

    document.getElementById('btnAccBatch').addEventListener('click', async () => {
        let checkboxes = document.querySelectorAll('.chk-wd:checked'); if(checkboxes.length === 0) return alert("Pilih minimal satu WD!");
        document.getElementById('btnAccBatch').innerText = "MEMPROSES...";
        for(let i = 0; i < checkboxes.length; i++) { 
            let chk = checkboxes[i]; let reqId = chk.value; let userDocId = chk.getAttribute('data-userdoc'); let nominal = parseInt(chk.getAttribute('data-nominal')); let jenisToken = chk.getAttribute('data-jenis'); let emailPemohon = chk.getAttribute('data-email'); let targetUser = chk.getAttribute('data-targetuser');
            try { 
                await runTransaction(db, async (transaction) => { 
                    const userRef = doc(db, "Akun_Publik", userDocId); const userDoc = await transaction.get(userRef); if (!userDoc.exists()) throw "Akun hilang"; 
                    transaction.update(userRef, { saldo_rupiah: (userDoc.data().saldo_rupiah || 0) - nominal }); 
                    let tk = `WD-${Math.floor(1000+Math.random()*9000)}`; 
                    transaction.set(doc(collection(db, "Database_Token")), { kode_token: tk, nominal_rupiah: nominal, status: "AKTIF", pembuat: emailPemohon, distribusi_ke: jenisToken, pemilik_username: targetUser, pengirim: emailPemohon, dibuat_pada: serverTimestamp() }); 
                    transaction.update(doc(db, "Request_Withdraw", reqId), { status: "APPROVED", kode_token_hasil: tk }); 
                    // CATAT KE BUKU KAS PUSAT SEBAGAI UANG KELUAR (OUT)
                    transaction.set(doc(collection(db, "Mutasi_Pusat")), { jenis: "OUT", nominal: nominal, deskripsi: `Pencairan WD a.n ${emailPemohon}`, waktu: serverTimestamp() });
                }); 
            } catch(e) {} 
        } 
        alert("WD Selesai Diproses!"); document.getElementById('btnAccBatch').innerText = "Setujui Terpilih"; 
    });
  </script>
</body>
</html>
